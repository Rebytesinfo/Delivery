<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loja Virtual</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .card img {
            height: 250px;
            object-fit: cover;
        }

        #carouselExample {
            width: 1300px;
            /* largura */
            margin: auto;
            /* centraliza */
        }

        .carousel-item img {
            height: 250px;
            object-fit: cover;
        }
    </style>

</head>

<body>

    <!-- MENU -->
    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand">
                UAITCHE
            </a>

        </div>

    </nav>

    <!-- CARROSSEL -->
    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">

                <img src="img/batata.png" class="d-block w-100" alt="Hamburguer 1">


            </div>

            <div class="carousel-item">

                <img src="img/hamburguer.png" class="d-block w-100" alt="Hamburguer 2">

            </div>

            <div class="carousel-item">

                <img src="img/hanburguer.png" class="d-block w-100" alt="Hamburguer 1">

            </div>

        </div>

        <!-- BOTÕES -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

    <!-- PRODUTOS -->
    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Produtos
        </h2>

        <div class="row g-4">

            <!-- PRODUTO 1 -->
            <div class="col-md-4">

                <div class="card shadow h-100">

                    <img src="img/batata.png" class="card-img-top">

                    <div class="card-body">

                        <h5 class="card-title">
                            Batata
                        </h5>

                        <p class="card-text">
                            Batata Frita
                        </p>

                        <h4>
                            R$ 50,00
                        </h4>

                        <button class="btn btn-success w-100" onclick="adicionarCarrinho('Camisa',50)">

                            Adicionar ao Carrinho

                        </button>

                    </div>

                </div>

            </div>

            <!-- PRODUTO 2 -->
            <div class="col-md-4">

                <div class="card shadow h-100">

                    <img src="img/hamburguer.png" class="card-img-top">

                    <div class="card-body">

                        <h5 class="card-title">
                            Hamburguer
                        </h5>

                        <p class="card-text">
                            Pão alface e tomate
                        </p>

                        <h4>
                            R$ 18,00
                        </h4>

                        <button class="btn btn-success w-100" onclick="adicionarCarrinho('Tênis',120)">

                            Adicionar ao Carrinho

                        </button>

                    </div>

                </div>

            </div>

            <!-- PRODUTO 3 -->
            <div class="col-md-4">

                <div class="card shadow h-100">

                    <img src="img/porcao.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5 class="card-title">
                            Porção de carne
                        </h5>

                        <p class="card-text">
                            Carne acebolado
                        </p>

                        <h4>
                            R$ 50,00
                        </h4>

                        <button class="btn btn-success w-100" onclick="adicionarCarrinho('Boné',35)">

                            Adicionar ao Carrinho

                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- CARRINHO -->
        <div class="mt-5 bg-white p-4 rounded shadow">

            <h2>
                Carrinho
            </h2>

            <ul id="listaCarrinho" class="list-group mb-3">

            </ul>

            <h4 id="total">
                Total: R$ 0
            </h4>

            <!-- NOME -->
            <div class="mt-3">

                <label class="form-label">
                    Nome
                </label>

                <input type="text" id="nome" class="form-control">

            </div>

            <!-- ENDEREÇO -->
            <div class="mt-3">

                <label class="form-label">
                    Endereço
                </label>
                <input type="text" id="endereco" class="form-control">
            </div>
            <div class="mt-3">
                <label class="form-label">
                    Bairro
                </label>

                <select id="bairro" class="form-select">

                    <option>Dom Pedro I</option>

                    <option>Cachoeira</option>

                    <option>Lar de Minas</option>

                    <option>Jardim Encantado</option>

                </select>

            </div>
            <div class="mt-3">
                <label class="form-label">
                    Cidade
                </label>

                <select id="cidade" class="form-select">

                    <option>Vespasiano</option>

                    <option>Confins</option>

                    <option>São José da Lapa</option>

                    <option>Pedro Leopoldo</option>

                </select>

            </div>
            <div class="mt-3">

                <label class="form-label">
                    Frete
                </label>

                <input type="text" id="frete" class="form-control" placeholder="Ex: 100">

            </div>
            <!-- PAGAMENTO -->
            <div class="mt-3">

                <label class="form-label">
                    Forma de Pagamento
                </label>

                <select id="pagamento" class="form-select">

                    <option>PIX</option>

                    <option>Cartão de Crédito</option>

                    <option>Cartão de Débito</option>

                    <option>Dinheiro</option>

                </select>

            </div>

            <!-- TROCO -->
            <div class="mt-3">

                <label class="form-label">
                    Troco para
                </label>

                <input type="text" id="troco" class="form-control" placeholder="Ex: 100">

            </div>

            <!-- BOTÃO -->
            <button class="btn btn-primary w-100 mt-4" onclick="enviarWhatsApp()">

                Finalizar Pedido

            </button>


        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        let carrinho = [];

        let total = 0;

        function adicionarCarrinho(produto, preco) {

            carrinho.push({
                nome: produto,
                valor: preco
            });

            total += preco;

            atualizarCarrinho();
        }

        function atualizarCarrinho() {

            let lista =
                document.getElementById("listaCarrinho");

            lista.innerHTML = "";

            carrinho.forEach((item, index) => {

                lista.innerHTML += `

                <li class="list-group-item d-flex justify-content-between align-items-center">

                    ${item.nome} - R$ ${item.valor}

                    <button class="btn btn-danger btn-sm"
                    onclick="removerItem(${index})">

                        X

                    </button>

                </li>

                `;

            });

            document.getElementById("total")
                .innerHTML = `Total: R$ ${total}`;
        }

        function removerItem(index) {

            total -= carrinho[index].valor;

            carrinho.splice(index, 1);

            atualizarCarrinho();
        }

        function enviarWhatsApp() {

            let nome =
                document.getElementById("nome").value;

            let endereco =
                document.getElementById("endereco").value;
            let bairro =
                document.getElementById("bairro").value;

            let cidade =
                document.getElementById("cidade").value;

            let pagamento =
                document.getElementById("pagamento").value;

            let frete =
                document.getElementById("frete").value;

            let troco =
                document.getElementById("troco").value;

            let mensagem =
                `*NOVO PEDIDO*%0A%0A`;

            mensagem += `Nome: ${nome}%0A`;

            mensagem += `Endereço: ${endereco}%0A`;

            mensagem += `Bairro: ${bairro}%0A`;

            mensagem += `Cidade: ${cidade}%0A%0A`;

            

            mensagem += `*Produtos:*%0A`;

            carrinho.forEach(item => {

                mensagem += `- ${item.nome} | R$ ${item.valor}%0A`;

            });

            let totalComfrete = total + frete;

            mensagem += `%0ATotal: R$ ${totalComfrete}%0A`;
            
            mensagem += `Frete: ${frete}%0A%0A`;

            mensagem += `Pagamento: ${pagamento}%0A`;

            if (pagamento == "Dinheiro") {

                mensagem += `Troco para: R$ ${troco}%0A`;

            }

            let numero = "5531992835225";

            let url =
                `https://wa.me/${numero}?text=${mensagem}`;

            window.open(url, "_blank");
        }
    </script>

    <!-- JS BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
